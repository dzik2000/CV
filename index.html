<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jan Kowalski CV</title>

<style>

body{
margin:0;
background:black;
color:#00ff66;
font-family:monospace;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* XP WINDOW */

#xpWindow{
background:#ece9d8;
border:2px solid #0054e3;
width:320px;
font-family:Tahoma;
color:black;
box-shadow:4px 4px 10px rgba(0,0,0,0.5);
}

#xpTitle{
background:linear-gradient(#3a6ea5,#1c3f94);
color:white;
padding:4px;
font-size:14px;
}

#xpContent{
padding:20px;
text-align:center;
}

button{
margin:10px;
padding:6px 20px;
font-family:Tahoma;
}

/* BIOS */

#bios{
display:none;
max-width:90vw;
white-space:pre-wrap;
}

/* TERMINAL */

#terminal{
display:none;
max-width:90vw;
}

input{
background:black;
border:none;
color:#00ff66;
font-family:monospace;
font-size:18px;
outline:none;
}

img{
max-width:300px;
display:block;
margin-top:10px;
}

</style>

</head>

<body>

<div id="xpWindow">

<div id="xpTitle">
Uruchamianie aplikacji
</div>

<div id="xpContent">

Czy chcesz uruchomić aplikację  
<b>Jan Kowalski CV</b> ?

<br><br>

<button onclick="start()">Tak</button>
<button onclick="no()">Nie</button>

</div>

</div>


<div id="bios">
<pre id="boot"></pre>
</div>


<div id="terminal">

<span>C:\CV></span>
<input id="command">

<div id="output"></div>

</div>


<script>

/* XP WINDOW */

function no(){

document.getElementById("xpWindow").style.display="none"

setTimeout(()=>{
document.getElementById("xpWindow").style.display="block"
},300)

}

function start(){

document.getElementById("xpWindow").style.display="none"
startBoot()

}

/* BIOS */

const boot=document.getElementById("boot")

const lines=[

"Urząd statystyczny w Katowicach 2.0",
"Copyright 1912-1945 Miasto Katowice",
"",
"Niezidentyfikowany system...",
"Wykrywanie nowego zgłoszenia...",
"CV: Jan Kowalski wykryto",
"",
"Kalibracja kubka z kawą...",
"Sprawdzanie poziomu motywacji...",
"Test cierpliwości rekrutera...",
"",
"Uruchamianie CV kandydata..."

]

let i=0

function startBoot(){

document.getElementById("bios").style.display="block"

function next(){

if(i<lines.length){

boot.innerHTML+=lines[i]+"\n"

i++

setTimeout(next,400)

}else{

loadCV()

}

}

next()

}

function loadCV(){

let percent=0

let interval=setInterval(()=>{

boot.innerHTML="Uruchamianie CV kandydata... "+percent+"%"

percent++

if(percent>100){

clearInterval(interval)

boot.innerHTML+="\n\nNapisz /pomoc aby wyświetlić dostępne komendy\n\n"

startTerminal()

}

},30)

}

/* TERMINAL */

function startTerminal(){

document.getElementById("terminal").style.display="block"

const command=document.getElementById("command")
const output=document.getElementById("output")

command.focus()

let photoStage=0

command.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let cmd=command.value.trim()

let res=""

if(cmd==="/pomoc"){
res="/profil /wyksztalcenie /umiejetnosci /zdjęcie"
}

else if(cmd==="/profil"){
res="Jan Kowalski\nKandydat na młodszego informatyka"
}

else if(cmd==="/wyksztalcenie"){
res="Technikum informatyczne"
}

else if(cmd==="/umiejetnosci"){
res="Instalacja systemów\nHelpdesk\nDiagnostyka sprzętu"
}

else if(cmd==="/zdjęcie"){

photoStage=1

output.innerHTML+=`
<div>
<img src="obraz.png" style="image-rendering:pixelated;width:120px">
<p>Czy poprawić jakość zdjęcia? Tak/Nie</p>
</div>
`

command.value=""
return
}

else if(cmd.toLowerCase()==="tak" && photoStage>0){

photoStage++

if(photoStage==2){

output.innerHTML+=`
<img src="obraz.png" style="width:200px">
<p>Czy poprawić jakość zdjęcia? Tak/Nie</p>
`
}

else if(photoStage==3){

output.innerHTML+=`
<img src="obraz.png" style="width:300px">
<p>Czy poprawić jakość zdjęcia? Tak/Nie</p>
`
}

else{

output.innerHTML+=`
<img src="obraz2.png">
<p>BŁĄD: przekroczono maksymalną jakość zdjęcia.</p>
`

photoStage=0

}

command.value=""
return
}

else if(cmd.toLowerCase()==="nie"){
res="Anulowano poprawę jakości."
photoStage=0
}

else{
res="Nieznana komenda"
}

output.innerHTML+="<pre>"+cmd+"\n"+res+"</pre>"

command.value=""

}

})

}

</script>

</body>

</html>
