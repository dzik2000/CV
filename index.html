<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Booting...</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;
font-size:18px;
padding:20px;
}

#cursor{
display:inline-block;
width:10px;
background:#00ff00;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

input{
background:black;
border:none;
color:#00ff00;
font-family:monospace;
font-size:18px;
outline:none;
}

</style>

</head>

<body>

<pre id="screen"></pre>

<div id="terminal" style="display:none;">
<span>C:\CV></span>
<input id="command" autofocus>
<div id="output"></div>
</div>

<script>

const screen = document.getElementById("screen");

const bootLines = [
"Phoenix BIOS v4.0 Release 6.0",
"Copyright 1985-1999 Phoenix Technologies Ltd.",
"",
"CPU: Intel Pentium 200MHz detected",
"Checking NVRAM...",
"",
"Memory Test:",
];

let ram = 0;

function typeLine(text, callback){
let i=0;
let interval = setInterval(()=>{
screen.textContent += text[i];
i++;
if(i >= text.length){
clearInterval(interval);
screen.textContent += "\n";
setTimeout(callback,300);
}
},20);
}

function bootSequence(){

let i=0;

function next(){
if(i < bootLines.length){
typeLine(bootLines[i], ()=>{
i++;
next();
});
}else{
memoryTest();
}
}

next();

}

function memoryTest(){

let interval = setInterval(()=>{

ram += 512;

screen.textContent = screen.textContent.replace(/Memory Test:.*/,"Memory Test: "+ram+"K");

if(ram >= 8192){

clearInterval(interval);

screen.textContent += " OK\n\n";
screen.textContent += "Booting DomekOS...\n\n";
screen.textContent += "Type /help\n\n";

setTimeout(()=>{
document.getElementById("terminal").style.display="block";
},1000);

}

},100);

}

bootSequence();

const commandInput = document.getElementById("command");
const output = document.getElementById("output");

commandInput.addEventListener("keydown", function(e){

if(e.key==="Enter"){

let cmd = commandInput.value.trim();

let response="";

switch(cmd){

case "/help":
response="Commands:\n/wyksztalcenie\n/umiejetnosci\n/projekty\n/kontakt";
break;

case "/wyksztalcenie":
response="Technikum Informatyczne\nProfil: IT";
break;

case "/umiejetnosci":
response="Python\nLinux\nOBS\nHTML\nAutomatyzacja";
break;

case "/projekty":
response="Bot TikTok Live\nMini gry dla streamów\nAutomatyzacje OBS";
break;

case "/kontakt":
response="email: twoj@email\nGitHub: github.com/twojprofil";
break;

default:
response="Unknown command. type /help";
}

output.innerHTML += "<pre>"+cmd+"\n"+response+"</pre>";

commandInput.value="";

}

});

</script>

</body>
</html>
